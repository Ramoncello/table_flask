<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Table de multiplication</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    .card {
      border: none;
      border-radius: 1rem;
      box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
    }
    .table-result {
      font-family: 'Courier New', monospace;
      font-size: 1.1rem;
      background-color: #f8f9fa;
      border-radius: 0.5rem;
      padding: 1rem;
    }
  </style>
</head>
<body>

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6">

        <div class="card p-4">
          <h1 class="text-center mb-4" style="color: #764ba2;">
            🧮 Tables de multiplication
          </h1>

          <form method="post" id="operation-form">
            <div class="mb-3">
              <label for="operation" class="form-label fw-bold">Opération</label>
              <select class="form-select form-select-lg" id="operation" name="operation">
                <option value="multiplication" {% if operation == "multiplication" %}selected{% endif %}>
                  Multiplication
                </option>
                <option value="puissance" {% if operation == "puissance" %}selected{% endif %}>
                  Exposant (puissance)
                </option>
                <option value="factorielle" {% if operation == "factorielle" %}selected{% endif %}>
                  Factorielle
                </option>
              </select>
            </div>

            <div class="mb-3" id="bloc-nombre">
              <label for="n" class="form-label fw-bold">
                Nombre (entier positif)
              </label>
              <input type="text" class="form-control form-control-lg"
                     id="n" name="n" value="{{ n }}"
                     placeholder="Ex : 4">
              <small class="text-muted">
                Choisir un entier de 0 à 20 (pour factorielle, 0 à 12 conseillé).
              </small>
            </div>

            <div class="mb-3" id="bloc-borne-max">
              <label for="borne_max" class="form-label fw-bold">Borne max</label>
              <input type="text" class="form-control form-control-lg"
                     id="borne_max" name="borne_max" value="{{ borne_max }}"
                     placeholder="Ex : 10">
              <small class="text-muted">
                Multiplication et puissance : borne max entre 1 et 20.
              </small>
            </div>

            <div class="d-grid" id="bloc-bouton">
              <button type="submit" class="btn btn-lg text-white"
                      style="background: linear-gradient(135deg, #667eea, #764ba2);">
                Calculer
              </button>
            </div>
          </form>

          {% if message %}
            <div class="alert alert-danger mt-3 text-center" role="alert">
              {{ message }}
            </div>
          {% endif %}

          {% if table %}
            <div class="table-result mt-4">
              {% for ligne in table %}
                {{ ligne }}<br>
              {% endfor %}
            </div>
          {% endif %}
        </div>

        <p class="text-center text-white mt-3">
          <small>Fait avec Flask & Bootstrap 5</small>
        </p>

      </div>
    </div>
  </div>

  <script>
    function mettreAJourAffichage() {
      const selectOp = document.getElementById("operation");
      const blocNombre = document.getElementById("bloc-nombre");
      const blocBorneMax = document.getElementById("bloc-borne-max");
      const blocBouton = document.getElementById("bloc-bouton");

      const op = selectOp.value;

      // On montre toujours le bloc nombre et le bouton
      blocNombre.style.display = "block";
      blocBouton.style.display = "block";

      // Borne max seulement pour multiplication et puissance
      if (op === "multiplication" || op === "puissance") {
        blocBorneMax.style.display = "block";
      } else {
        blocBorneMax.style.display = "none";
      }
    }

    function initialiserAffichage() {
      const blocNombre = document.getElementById("bloc-nombre");
      const blocBorneMax = document.getElementById("bloc-borne-max");
      const blocBouton = document.getElementById("bloc-bouton");

      // Au tout premier chargement, on ne montre que la sélection d'opération
      blocNombre.style.display = "none";
      blocBorneMax.style.display = "none";
      blocBouton.style.display = "none";

      const selectOp = document.getElementById("operation");
      selectOp.addEventListener("change", function () {
        // Dès qu'on choisit une opération, on affiche les champs appropriés
        mettreAJourAffichage();
      });
    }

    document.addEventListener("DOMContentLoaded", initialiserAffichage);
  </script>

</body>
</html>
